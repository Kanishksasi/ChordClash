<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Clash - Interactive Music Education</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #0a0e27;
            color: #e0e6ff;
        }

        #root {
            height: 100vh;
            width: 100vw;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a4d 50%, #0d1a3d 100%);
            z-index: -2;
        }

        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 1.5px;
            height: 1.5px;
            background: #64b5ff;
            border-radius: 50%;
            opacity: 0.6;
            box-shadow: 0 0 3px rgba(100, 181, 255, 0.8);
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) translateX(30px); opacity: 0; }
        }

        .screen {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            padding: 1.8rem 3rem;
            border-bottom: 1px solid rgba(100, 181, 255, 0.15);
            background: linear-gradient(180deg, rgba(10, 14, 39, 0.95) 0%, rgba(10, 14, 39, 0.7) 100%);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #64b5ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .header-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .rating-box {
            background: rgba(100, 181, 255, 0.1);
            border: 1px solid rgba(100, 181, 255, 0.25);
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .rating-label {
            font-size: 0.7rem;
            color: rgba(224, 230, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .rating-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }

        .nav-button {
            background: rgba(100, 181, 255, 0.08);
            border: 1px solid rgba(100, 181, 255, 0.3);
            color: #64b5ff;
            padding: 0.7rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .nav-button:hover {
            background: rgba(100, 181, 255, 0.15);
            border-color: #00ffff;
            color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem 3rem;
            display: flex;
            flex-direction: column;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(100, 181, 255, 0.25);
            border-radius: 3px;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(100, 181, 255, 0.15);
        }

        .tab {
            padding: 1rem 1.5rem;
            background: transparent;
            border: none;
            color: rgba(224, 230, 255, 0.6);
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #00ffff;
            border-bottom-color: #00ffff;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #e0e6ff;
        }

        .page-subtitle {
            font-size: 1rem;
            color: rgba(224, 230, 255, 0.6);
            margin-bottom: 2.5rem;
        }

        .difficulty-section {
            margin-bottom: 3rem;
        }

        .difficulty-label {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 0.8rem 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #64b5ff;
            background: rgba(100, 181, 255, 0.06);
            border-radius: 4px;
            display: inline-block;
            color: #64b5ff;
        }

        .difficulty-label.easy {
            border-left-color: #00ff88;
            color: #00ff88;
            background: rgba(0, 255, 136, 0.06);
        }

        .difficulty-label.intermediate {
            border-left-color: #ffaa00;
            color: #ffaa00;
            background: rgba(255, 170, 0, 0.06);
        }

        .difficulty-label.hard {
            border-left-color: #ff6464;
            color: #ff6464;
            background: rgba(255, 100, 100, 0.06);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.8rem;
            margin-bottom: 2rem;
        }

        .card {
            background: linear-gradient(135deg, rgba(100, 181, 255, 0.07) 0%, rgba(50, 130, 200, 0.03) 100%);
            border: 1px solid rgba(100, 181, 255, 0.15);
            border-radius: 10px;
            padding: 1.8rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card:hover {
            border-color: rgba(100, 181, 255, 0.4);
            background: linear-gradient(135deg, rgba(100, 181, 255, 0.12) 0%, rgba(50, 130, 200, 0.06) 100%);
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(100, 181, 255, 0.15);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #e0e6ff;
        }

        .card-artist {
            font-size: 0.85rem;
            color: rgba(224, 230, 255, 0.6);
            font-weight: 500;
        }

        .card-description {
            font-size: 0.9rem;
            color: rgba(224, 230, 255, 0.65);
            line-height: 1.5;
        }

        .card-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            padding: 1rem 0;
            border-top: 1px solid rgba(100, 181, 255, 0.1);
            border-bottom: 1px solid rgba(100, 181, 255, 0.1);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: rgba(224, 230, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #64b5ff;
        }

        .btn {
            padding: 0.9rem 2rem;
            border: 1px solid rgba(100, 181, 255, 0.4);
            background: rgba(100, 181, 255, 0.08);
            color: #64b5ff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            width: 100%;
            font-family: inherit;
        }

        .btn:hover {
            border-color: rgba(100, 181, 255, 0.6);
            background: rgba(100, 181, 255, 0.15);
            box-shadow: 0 0 20px rgba(100, 181, 255, 0.15);
        }

        .lesson-card {
            background: rgba(100, 181, 255, 0.08);
            border: 1px solid rgba(100, 181, 255, 0.2);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .lesson-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .lesson-content {
            font-size: 0.95rem;
            line-height: 1.8;
            color: rgba(224, 230, 255, 0.8);
        }

        .game-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .battle-arena {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
            align-items: start;
        }

        .enemy-side {
            text-align: center;
        }

        .enemy {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 2s ease-in-out infinite;
        }

        .enemy-health {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .health-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 100, 100, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6464, #ff9999);
            transition: width 0.3s ease;
        }

        .health-text {
            font-size: 0.85rem;
            color: #ff6464;
            font-weight: 700;
        }

        .customer-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #e0e6ff;
            margin-bottom: 0.5rem;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .song-info {
            text-align: center;
            width: 100%;
        }

        .song-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #e0e6ff;
            margin-bottom: 0.3rem;
        }

        .song-artist {
            font-size: 1rem;
            color: rgba(224, 230, 255, 0.6);
            margin-bottom: 1.5rem;
        }

        .progress-text {
            font-size: 0.9rem;
            color: rgba(224, 230, 255, 0.6);
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(100, 181, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid rgba(100, 181, 255, 0.15);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #64b5ff, #00ffff);
            transition: width 0.4s ease;
            box-shadow: 0 0 15px rgba(100, 181, 255, 0.3);
        }

        .chord-line {
            background: rgba(100, 181, 255, 0.08);
            border: 1px solid rgba(100, 181, 255, 0.2);
            border-radius: 10px;
            padding: 1.5rem;
            width: 100%;
            overflow-x: auto;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .chord-item {
            min-width: 100px;
            padding: 1rem;
            background: rgba(100, 181, 255, 0.1);
            border: 1px solid rgba(100, 181, 255, 0.2);
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .chord-item.current {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .chord-item.completed {
            background: rgba(0, 255, 136, 0.15);
            border-color: #00ff88;
            color: #00ff88;
        }

        .chord-item.pending {
            color: rgba(224, 230, 255, 0.6);
        }

        .vs-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
            background: rgba(100, 181, 255, 0.06);
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .vs-card {
            text-align: center;
        }

        .vs-label {
            font-size: 0.8rem;
            color: rgba(224, 230, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .vs-score {
            font-size: 2.5rem;
            font-weight: 800;
            color: #64b5ff;
            margin-bottom: 0.5rem;
        }

        .ai-thinking {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            color: #ffaa00;
            font-size: 1.1rem;
        }

        .thinking-dot {
            width: 8px;
            height: 8px;
            background: #ffaa00;
            border-radius: 50%;
            animation: thinking 1.4s infinite;
        }

        .thinking-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes thinking {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .instruments {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            padding: 1.5rem;
            background: rgba(100, 181, 255, 0.06);
            border: 1px solid rgba(100, 181, 255, 0.12);
            border-radius: 10px;
            width: 100%;
        }

        .instrument-btn {
            padding: 0.7rem 1.5rem;
            border: 1px solid rgba(100, 181, 255, 0.25);
            background: rgba(100, 181, 255, 0.08);
            color: #64b5ff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .instrument-btn:hover {
            border-color: rgba(100, 181, 255, 0.5);
            background: rgba(100, 181, 255, 0.12);
        }

        .instrument-btn.active {
            border-color: #00ffff;
            background: rgba(0, 255, 255, 0.15);
            color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.25);
        }

        .chord-box {
            background: linear-gradient(135deg, rgba(100, 181, 255, 0.08) 0%, rgba(50, 130, 200, 0.04) 100%);
            border: 1px solid rgba(100, 181, 255, 0.25);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 40px rgba(100, 181, 255, 0.1);
            width: 100%;
        }

        .chord-label {
            font-size: 0.8rem;
            color: rgba(224, 230, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .chord-text {
            font-size: 4rem;
            font-weight: 800;
            color: #e0e6ff;
            margin-bottom: 1rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .chord-notes {
            font-size: 1.1rem;
            color: rgba(224, 230, 255, 0.7);
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
        }

        .chord-type {
            font-size: 0.85rem;
            color: rgba(224, 230, 255, 0.55);
            font-style: italic;
        }

        .keyboard-viz {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(100, 181, 255, 0.06);
            border-radius: 8px;
            margin-top: 1rem;
        }

        .key {
            padding: 0.8rem;
            background: rgba(100, 181, 255, 0.08);
            border: 1px solid rgba(100, 181, 255, 0.2);
            border-radius: 6px;
            text-align: center;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.1s ease;
            color: rgba(224, 230, 255, 0.6);
        }

        .key.pressed {
            background: rgba(0, 255, 136, 0.3);
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.4), inset 0 0 10px rgba(0, 255, 136, 0.2);
            transform: scale(1.05);
        }

        .input-area {
            display: flex;
            gap: 1rem;
            width: 100%;
            flex-direction: column;
        }

        .input-wrapper {
            display: flex;
            gap: 1rem;
        }

        .chord-input {
            flex: 1;
            padding: 1rem 1.5rem;
            background: rgba(100, 181, 255, 0.08);
            border: 2px solid rgba(100, 181, 255, 0.25);
            border-radius: 8px;
            color: #e0e6ff;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            caret-color: #00ffff;
        }

        .chord-input::placeholder {
            color: rgba(224, 230, 255, 0.35);
        }

        .chord-input:focus {
            outline: none;
            border-color: rgba(100, 181, 255, 0.5);
            background: rgba(100, 181, 255, 0.12);
            box-shadow: 0 0 20px rgba(100, 181, 255, 0.15);
        }

        .feedback {
            padding: 1.2rem;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            animation: slideUp 0.3s ease-out;
            border: 1px solid;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-correct {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-color: rgba(0, 255, 136, 0.25);
        }

        .feedback-wrong {
            background: rgba(255, 100, 100, 0.1);
            color: #ff6464;
            border-color: rgba(255, 100, 100, 0.25);
        }

        .ai-coach {
            background: rgba(100, 181, 255, 0.1);
            border: 1px solid rgba(100, 181, 255, 0.2);
            border-radius: 8px;
            padding: 1rem;
            font-size: 0.9rem;
            line-height: 1.6;
            color: rgba(224, 230, 255, 0.8);
            margin-top: 1rem;
            animation: slideUp 0.3s ease-out;
        }

        .results-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2rem;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }

        .result-title {
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            color: #e0e6ff;
        }

        .result-title.won {
            color: #00ff88;
        }

        .scores-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            width: 100%;
        }

        .score-card {
            background: linear-gradient(135deg, rgba(100, 181, 255, 0.08) 0%, rgba(50, 130, 200, 0.04) 100%);
            border: 1px solid rgba(100, 181, 255, 0.2);
            border-radius: 10px;
            padding: 1.8rem;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .score-label {
            font-size: 0.8rem;
            color: rgba(224, 230, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.8rem;
        }

        .score-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #64b5ff;
            font-family: 'Courier New', monospace;
        }

        .elo-box {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
            padding: 1.2rem;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            width: 100%;
        }

        .export-btn {
            background: rgba(100, 181, 255, 0.15);
            border: 1px solid rgba(100, 181, 255, 0.4);
            color: #64b5ff;
            padding: 1rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            width: 100%;
            transition: all 0.3s ease;
        }

        .export-btn:hover {
            background: rgba(100, 181, 255, 0.25);
            border-color: #00ffff;
            color: #00ffff;
            box-shadow: 0 0 20px rgba(100, 181, 255, 0.2);
        }

        .result-buttons {
            display: flex;
            gap: 1rem;
            width: 100%;
            flex-direction: column;
        }

        .result-buttons .btn {
            flex: 1;
        }

        @media (max-width: 768px) {
            .header {
                padding: 1.2rem 1.5rem;
                flex-direction: column;
                gap: 1rem;
            }

            .title {
                font-size: 1.4rem;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .content {
                padding: 1.5rem;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 1.6rem;
            }

            .chord-text {
                font-size: 2.5rem;
            }

        class AdvancedSynthesizer {
            constructor() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.master = this.ctx.createGain();
                this.master.gain.value = 0.4;
                this.master.connect(this.ctx.destination);
            }

            noteToFreq(note) {
                const notes = { C: 0, "C#": 1, D: 2, "D#": 3, E: 4, F: 5, "F#": 6, G: 7, "G#": 8, A: 9, "A#": 10, B: 11 };
                const octaveFreq = 16.35;
                const match = note.match(/([A-G]#?)(\d+)/);
                if (!match) return 440;
                const semitone = notes[match[1]];
                const octave = parseInt(match[2]);
                return octaveFreq * Math.pow(2, octave + semitone / 12);
            }

            playChord(chordName, instrument = "piano") {
                const normalized = chordName.toUpperCase();
                const noteList = CHORD_NOTES[normalized]?.notes || [];
                const now = this.ctx.currentTime;

                noteList.forEach((note, idx) => {
                    const freq = this.noteToFreq(note);
                    this.playNote(freq, instrument, now + idx * 0.04);
                });
            }

            playNote(freq, inst, start) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();

                if (inst === "piano") {
                    osc.type = "sine";
                    filter.type = "lowpass";
                    filter.frequency.value = 9000;
                    gain.gain.setValueAtTime(0.18, start);
                    gain.gain.exponentialRampToValueAtTime(0.05, start + 2.2);
                } else if (inst === "strings") {
                    osc.type = "sawtooth";
                    filter.type = "lowpass";
                    filter.frequency.value = 4500;
                    gain.gain.setValueAtTime(0.12, start);
                    gain.gain.exponentialRampToValueAtTime(0.03, start + 3);
                } else if (inst === "synth") {
                    osc.type = "triangle";
                    filter.type = "lowpass";
                    filter.frequency.setValueAtTime(8500, start);
                    filter.frequency.exponentialRampToValueAtTime(2000, start + 1.8);
                    gain.gain.setValueAtTime(0.14, start);
                    gain.gain.exponentialRampToValueAtTime(0.02, start + 1.8);
                } else if (inst === "bell") {
                    osc.type = "sine";
                    filter.type = "highpass";
                    filter.frequency.value = 150;
                    gain.gain.setValueAtTime(0.2, start);
                    gain.gain.exponentialRampToValueAtTime(0.01, start + 3.5);
                }

                osc.frequency.value = freq;
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.master);

                osc.start(start);
                osc.stop(start + (inst === "bell" ? 3.5 : inst === "strings" ? 3 : 2.2));
            }
        }

                                                <div className="enemy-health">
                                                    <div className="health-bar">
                                                        <div className="health-fill" style={{ width: `${enemyHealth}%` }} />
                                                    </div>
                                                    <div className="health-text">Enemy: {enemyHealth}%</div>
                                                </div>
                                            </div>
                                            <div className="enemy-side">
                                                <div className="customer-name">You</div>
                                                <div className="enemy">Your</div>
                                                <div className="enemy-health">
                                                    <div className="health-bar">
                                                        <div className="health-fill" style={{ width: `${Math.min(100, (score / (song.chords.length * 100)) * 100)}%`, background: "linear-gradient(90deg, #00ff88, #00cc66)" }} />
                                                    </div>
                                                    <div className="health-text">Progress: {score}/{song.chords.length * 100}</div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="song-info">
                                        <h2 className="song-title">{song.title}</h2>
                                        <p className="song-artist">{song.artist}</p>
                                        <p className="progress-text">Chord {idx + 1} of {song.chords.length}</p>
                                        <div className="progress-bar">
                                            <div className="progress-fill" style={{ width: `${((idx) / song.chords.length) * 100}%` }} />
                                        </div>
                                    </div>

                                    <div className="chord-line">
                                        {song.chords.map((c, i) => (
                                            <div key={i} className={`chord-item ${i === idx ? "current" : completed.has(i) ? "completed" : "pending"}`}>
                                                {c}
                                            </div>
                                        ))}
                                    </div>

                                    {gameMode === "practice" && (
                                        <div className="vs-container">
                                            <div className="vs-card">
                                                <div className="vs-label">You</div>
                                                <div className="vs-score">{score}</div>
                                            </div>
                                            <div className="vs-card">
                                                <div className="vs-label">AI Opponent</div>
                                                {aiThinking ? (
                                                    <div className="ai-thinking">
                                                        <div className="thinking-dot"></div>
                                                        <div className="thinking-dot"></div>
                                                        <div className="thinking-dot"></div>
                                                    </div>
                                                ) : (
                                                    <div className="vs-score">{aiScore}</div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    <div className="instruments">
                                        {["piano", "strings", "synth", "bell"].map(i => (
                                            <button key={i} className={`instrument-btn ${inst === i ? "active" : ""}`} onClick={() => setInst(i)}>
                                                {i.charAt(0).toUpperCase() + i.slice(1)}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="chord-box">
                                        <div className="chord-label">Current Chord</div>
                                        <div className="chord-text">{song.chords[idx]}</div>
                                        <div className="chord-notes">{CHORD_NOTES[song.chords[idx].toUpperCase()]?.notes?.join(" - ")}</div>
                                        <div className="chord-type">{CHORD_NOTES[song.chords[idx].toUpperCase()]?.type}</div>
                                    </div>

                                    <div className="keyboard-viz">
                                        {["C", "D", "E", "F", "G", "A", "B", "#", "M", "7", "9", "SUS"].map(k => (
                                            <div key={k} className={`key ${pressedKeys.has(k) ? "pressed" : ""}`}>{k}</div>
                                        ))}
                                    </div>

                                    <div className="input-area">
                                        <div className="input-wrapper">
                                            <input
                                                ref={input}
                                                type="text"
                                                className="chord-input"
                                                placeholder="Type the chord..."
                                                onKeyPress={e => {
                                                    if (e.key === "Enter") {
                                                        handleInput(e.target.value);
                                                        e.target.value = "";
                                                    }
                                                }}
                                            />
                                            <button className="btn" onClick={() => {
                                                const val = input.current?.value || "";
                                                handleInput(val);
                                                if (input.current) input.current.value = "";
                                            }} style={{ minWidth: "120px" }}>
                                                Submit
                                            </button>
                                        </div>

                                        {msg && <div className={`feedback ${msg.includes("Correct") ? "feedback-correct" : "feedback-wrong"}`}>{msg}</div>}
                                        {aiMsg && <div className="ai-coach">{aiMsg}</div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {screen === "results" && (
                        <div className="screen">
                            <div className="header">
                                <div className="title">Chord Clash</div>
                            </div>
                            <div className="content">
                                <div className="results-center">
                                    <h1 className={`result-title ${score > aiScore ? "won" : ""}`}>
                                        {score > aiScore ? "Victory!" : "Complete"}
                                    </h1>

                                    <div className="scores-grid">
                                        <div className="score-card">
                                            <div className="score-label">Your Score</div>
                                            <div className="score-number">{score}</div>
                                        </div>
                                        <div className="score-card">
                                            <div className="score-label">AI Score</div>
                                            <div className="score-number">{aiScore}</div>
                                        </div>
                                    </div>

                                    <div className="elo-box">
                                        {score > aiScore ? "+" : ""}{Math.round((1 / (1 + Math.pow(10, (aiScore - score) / 400))) * 32)} ELO
                                    </div>

                                    <button className="export-btn" onClick={exportSheet}>Export Sheet Music</button>

                                    <div className="result-buttons">
                                        <button className="btn" onClick={() => play(song, gameMode)}>Retry</button>
                                        <button className="btn" onClick={back}>Home</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<ChordClash />);
    </script>
</body>
</html>
